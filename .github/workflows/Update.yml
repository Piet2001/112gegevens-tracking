on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: update
        run: |
          python -u Scripts/Update.py
          python -u Scripts/Poll_rdw_inrichting.py
          python -u Scripts/Check_apk_expiry.py
        env:
          BRW_URL: ${{ secrets.BRW_URL  }}
          AMB_URL: ${{ secrets.AMB_URL  }}
          KAZ_URL: ${{ secrets.KAZ_URL  }}
          DISCORD: ${{ secrets.DISCORD  }}
          DISCORD_APK: ${{ secrets.DISCORD_APK  }}
          DISCORD_APK_LOG: ${{ secrets.DISCORD_APK_LOG  }}
          RDW_API_CHANGES_WEBHOOK: ${{ secrets.RDW_API_CHANGES_WEBHOOK  }}

      - name: json-syntax-check
        uses: limitusus/json-syntax-check@v1
        with:
          pattern: "\\.json$"

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: format files
        run: npx --yes prettier@3 --write "**/*.{js,md,json}"

      - name: commit and push as actions bot
        run: |
          export TZ="Europe/Amsterdam"
          COMMIT_MESSAGE="$(date '+%Y-%m-%d %H:00 - Update Documents')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "$COMMIT_MESSAGE"
          git push
